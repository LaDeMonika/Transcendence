services:
##DATABASE##
   postgres:
     build:
       context: ./docker/database/.
     container_name: postgres
     environment:
       POSTGRES_USER: ${DB_USER}
       POSTGRES_PASSWORD: ${DB_PASSWORD}
       POSTGRES_DB: ${DB_DATABASE}
     networks:
       - transcendence
####no data folder yet, to be changed later###
     volumes:
       - postgres-data:/var/lib/postgresql/data
     restart: unless-stopped
     expose:
       - "5432"
     ports:
       - "5432:5432"
##BACKEND##
   adonis:
     build:
       context: .
       dockerfile: docker/backend/Dockerfile
     container_name: adonis
     restart: unless-stopped
     depends_on:
       - postgres
     networks:
       - transcendence
     environment:
       - PORT=3333
       - HOST=0.0.0.0
       - DB_HOST=postgres
       - IMAGES_PATH=/app/public/images
     expose:
       - 3333
     ports:
       - "3333:3333"
##FRONTEND##
   vue:
     build:
       context: .
       dockerfile: docker/frontend/Dockerfile
     container_name: vue
     restart: unless-stopped
     expose:
       - "5173"
     volumes:
      # bind source files from host to container for hot reloading
       - ./srcs/frontend/src:/app/src
       - ./srcs/frontend/public:/app/public
       - ./srcs/frontend/index.html:/app/index.html
       - ./srcs/frontend/package.json:/app/package.json
       - ./srcs/frontend/package-lock.json:/app/package-lock.json
       - ./srcs/frontend/vite.config.js:/app/vite.config.js
       - ./srcs/frontend/jsconfig.json:/app/jsconfig.json
       - ./srcs/frontend/eslint.config.js:/app/eslint.config.js
       - ./srcs/frontend/.env:/app/.env
       - ./srcs/frontend/.vite:/app/.vite
     networks:
       - transcendence
     environment:
       - VITE_BACKEND_URL=/api
##NGINX##
   nginx:
     image: nginx:alpine
     container_name: nginx
     
     restart: unless-stopped
     depends_on:
       - adonis
     ports:
       - "80:80"
       - "443:443"
     volumes:
       - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
       - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
       - ./docker/nginx/ssl:/etc/nginx/ssl:ro
       #- ./srcs/frontend/dist:/var/www/html:ro
     networks:
       - transcendence
##VOLUMES##
volumes:
  postgres-data:
    driver: local
##NETWORK##
networks:
  transcendence:
    driver: bridge
